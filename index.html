<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Interaktif Mawadah</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #e9eaed, #5c8bdc);
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    text-align: center;
}

/* FOTO */
.photo-frame {
    background: #8dc7f9;
    padding: 10px;
    border-radius: 50%;
    display: inline-block;
}
.photo-frame img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
}

/* MENU */
.nav-card {
    background: #d6dcff;
    border-radius: 25px;
    padding: 15px;
    cursor: pointer;
    transition: 0.3s;
    color: #000;
}
.nav-card:hover {
    background: #7a8cdd;
    color: white;
    transform: translateY(-5px);
}

/* KONTEN */
.content-box {
    background: #8cceef;
    border-radius: 25px;
    padding: 25px;
    margin-top: 20px;
    color: #000;
}
</style>
</head>
